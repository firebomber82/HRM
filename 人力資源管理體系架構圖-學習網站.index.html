<title>人力資源管理體系架構圖｜學習筆記地圖</title>
<style>
  :root{

  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC","Heiti TC",sans-serif;}

  /* ===== 工具列 ===== */
  header{
    position:sticky;top:0;z-index:50;background:#fffdf8;border-bottom:2px solid #222;
    padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  }
  header h1{font-size:16px;margin:0 12px 0 0;letter-spacing:2px;font-weight:800;}
  header .tools{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  button.tbtn{
    border:1.5px solid #222;background:#fff;border-radius:6px;padding:5px 10px;
    font-size:13px;cursor:pointer;font-family:inherit;
  }
  button.tbtn:hover{background:#f0ede4;}
  button.tbtn:focus-visible{outline:3px solid #7aa;outline-offset:1px;}
  #searchInput{
    border:1.5px solid #222;border-radius:6px;padding:5px 8px;font-size:13px;width:150px;
    font-family:inherit;background:#fff;
  }
  .hint{font-size:12px;color:#666;}

  /* ===== 圖面 ===== */
  #viewport{overflow:auto;width:100%;height:calc(100vh - 54px);}
  #scaler{transform-origin:0 0;}
  #canvas{
    position:relative;width:1120px;height:1560px;margin:0;
    background:
      radial-gradient(circle at 30% 20%, rgba(0,0,0,0.015), transparent 60%),
      #fbfaf6;
  }
  #wires{position:absolute;left:0;top:0;z-index:1;}

  /* 標題與版權（重現原圖文字） */
  .chart-title{
    position:absolute;left:265px;top:18px;z-index:2;
    font-size:34px;font-weight:900;letter-spacing:4px;
    border-bottom:3px solid #111;padding-bottom:2px;
  }
  .chart-credit{
    position:absolute;left:690px;top:78px;z-index:2;
    font-size:13.5px;line-height:1.7;color:#222;text-align:left;white-space:nowrap;
  }

  /* 分區虛線框與標籤 */
  .zone{
    position:absolute;border:1.5px dashed #7a7a7a;z-index:1;pointer-events:none;
    border-radius:2px;
  }
  .zone-label{
    position:absolute;z-index:2;font-size:15px;color:var(--zone-label);
    letter-spacing:2px;pointer-events:none;font-weight:600;background:transparent;
  }
  .badge{
    position:absolute;z-index:3;width:26px;height:26px;border-radius:50%;
    background:#111;color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;pointer-events:none;box-shadow:1px 1px 0 #999;
  }

  /* 方框 */
  .node{
    position:absolute;z-index:4;background:var(--box-bg);
    border:2px solid var(--line);border-radius:2px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;cursor:pointer;padding:3px 4px;
    box-shadow:1.5px 1.5px 0 rgba(0,0,0,.35);
    transition:transform .08s ease, box-shadow .08s ease, background .15s;
    font-size:14.5px;line-height:1.35;letter-spacing:1px;
  }
  .node:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 rgba(0,0,0,.4);background:#fffef5;}
  .node:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .node .b{font-weight:800;}
  .node.hit{background:#fff3bf;border-color:#b8860b;}
  .node.dim{opacity:.28;}
  .node .dot{
    position:absolute;top:-6px;right:-6px;width:13px;height:13px;border-radius:50%;
    background:var(--accent);border:2px solid #fff;display:none;
  }
  .node.has-note .dot{display:block;}

  /* ===== 筆記視窗 ===== */
  #overlay{
    position:fixed;inset:0;background:rgba(20,20,20,.45);z-index:100;
    display:none;align-items:center;justify-content:center;padding:14px;
  }
  #overlay.open{display:flex;}
  #modal{
    background:#fffdf7;width:min(720px,100%);max-height:88vh;border:2px solid #222;
    border-radius:10px;box-shadow:6px 6px 0 rgba(0,0,0,.35);

    display:flex;align-items:center;gap:10px;
  }

    white-space:nowrap;
  }
  #modal .mhead h2{font-size:18px;margin:0;flex:1;letter-spacing:1px;}
  #modal .mclose{border:none;background:none;font-size:22px;cursor:pointer;line-height:1;padding:4px;}
  #modal .mbody{padding:14px 16px;overflow:auto;display:flex;flex-direction:column;gap:10px;}
  #noteArea{
    width:100%;min-height:260px;border:1.5px solid #999;border-radius:6px;
    padding:10px;font-size:15px;line-height:1.7;font-family:inherit;resize:vertical;background:#fff;
  }
  #modal .mfoot{
    padding:10px 16px;border-top:1.5px solid #ccc;display:flex;gap:8px;align-items:center;
    background:#faf8f0;
  }
  #saveState{font-size:12.5px;color:var(--accent);margin-left:auto;}
  .primary{
    border:2px solid #111;background:#1c6e46;color:#fff;border-radius:6px;
    padding:7px 16px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;
  }
  .ghost{
    border:1.5px solid #555;background:#fff;border-radius:6px;padding:7px 12px;
    font-size:13px;cursor:pointer;font-family:inherit;
  }
  .mtips{font-size:12.5px;color:#777;}

  @media (max-width:640px){
    header h1{font-size:14px;}
    #searchInput{width:110px;}
  }
  @media (prefers-reduced-motion: reduce){
    .node{transition:none;}
  }
</style>
</head>

 // 離職管理 → 留才對策 → 員工關係
 {pts:[[422,1430],[422,1386]]},
 {pts:[[422,1342],[422,1268]]},
];

/* ============================================================
   繪製
============================================================ */
const canvas = document.getElementById("canvas");
const wireGroup = document.getElementById("wireGroup");

ZONES.forEach(z=>{
  const d=document.createElement("div");
  d.className="zone";
  d.style.cssText=`left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;`;
  canvas.appendChild(d);
  const l=document.createElement("div");
  l.className="zone-label"; l.textContent=z.label;
  l.style.cssText=`left:${z.lx}px;top:${z.ly}px;`;
  canvas.appendChild(l);
});

BADGES.forEach(b=>{
  const d=document.createElement("div");
  d.className="badge"; d.textContent=b.n;
  d.style.cssText=`left:${b.x}px;top:${b.y}px;`;
  canvas.appendChild(d);
});

WIRES.forEach(w=>{
  const p=document.createElementNS("http://www.w3.org/2000/svg","polyline");
  p.setAttribute("points", w.pts.map(pt=>pt.join(",")).join(" "));
  if(w.head!=="none") p.setAttribute("marker-end","url(#arr)");
  if(w.head==="both") p.setAttribute("marker-start","url(#arr)");
  wireGroup.appendChild(p);
});

const NOTE_KEY="hr_map_notes_v1";
let notes={};
try{ notes=JSON.parse(localStorage.getItem(NOTE_KEY)||"{}"); }catch(e){ notes={}; }

const nodeEls={};
BOXES.forEach(b=>{
  const d=document.createElement("div");
  d.className="node"; d.tabIndex=0; d.setAttribute("role","button");
  d.dataset.id=b.id;
  d.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px;`;
  d.innerHTML = b.lines.map(l=>`<span class="${l.b?'b':''}">${l.t}</span>`).join("")
              + `<span class="dot" aria-hidden="true"></span>`;
  d.setAttribute("aria-label", b.lines.map(l=>l.t).join("") + "，點擊開啟筆記");
  d.addEventListener("click",()=>openModal(b));
  d.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();openModal(b);} });
  canvas.appendChild(d);
  nodeEls[b.id]=d;
  refreshDot(b.id);
});

function refreshDot(id){
  nodeEls[id].classList.toggle("has-note", !!(notes[id]&&notes[id].trim()));
}

/* ============================================================
   筆記視窗
============================================================ */
const overlay=document.getElementById("overlay");
const mTitle=document.getElementById("mTitle");
const mZone=document.getElementById("mZone");
const noteArea=document.getElementById("noteArea");
const saveState=document.getElementById("saveState");
let currentId=null, autoTimer=null;

function openModal(b){
  currentId=b.id;
  mTitle.textContent=b.lines.map(l=>l.t).join("／");
  mZone.textContent=b.zone;
  noteArea.value=notes[b.id]||"";
  saveState.textContent="";
  overlay.classList.add("open");
  setTimeout(()=>noteArea.focus(),60);
}
function closeModal(){
  overlay.classList.remove("open");
  currentId=null;
}
function saveNote(silent){
  if(!currentId) return;
  notes[currentId]=noteArea.value;
  localStorage.setItem(NOTE_KEY, JSON.stringify(notes));
  refreshDot(currentId);
  saveState.textContent= silent ? "已自動儲存 ✓" : "已儲存 ✓";
}
noteArea.addEventListener("input",()=>{
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>saveNote(true),800);
});
document.getElementById("saveBtn").addEventListener("click",()=>saveNote(false));
document.getElementById("clearBtn").addEventListener("click",()=>{
  if(!currentId) return;
  if(confirm("確定要清除這個框框的筆記嗎？")){
    noteArea.value=""; saveNote(false);
  }
});
document.getElementById("mClose").addEventListener("click",()=>{saveNote(true);closeModal();});
overlay.addEventListener("click",e=>{ if(e.target===overlay){saveNote(true);closeModal();} });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&overlay.classList.contains("open")){saveNote(true);closeModal();} });

/* ============================================================
   搜尋（比對框框文字與筆記內容）
============================================================ */
document.getElementById("searchInput").addEventListener("input",e=>{
  const q=e.target.value.trim();
  BOXES.forEach(b=>{
    const el=nodeEls[b.id];
    el.classList.remove("hit","dim");
    if(!q) return;
    const text=b.lines.map(l=>l.t).join("")+(notes[b.id]||"");
    if(text.includes(q)) el.classList.add("hit"); else el.classList.add("dim");
  });
});

/* ============================================================
   匯出 / 匯入（跨裝置同步筆記）
============================================================ */
document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(notes,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date(), pad=n=>String(n).padStart(2,"0");
  a.download=`HR學習筆記_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(typeof data!=="object"||Array.isArray(data)) throw 0;
      notes={...notes,...data};
      localStorage.setItem(NOTE_KEY,JSON.stringify(notes));
      BOXES.forEach(b=>refreshDot(b.id));
      alert("筆記匯入完成！");
    }catch(err){ alert("檔案格式不正確，請選擇先前匯出的 JSON 筆記檔。"); }
  };
  r.readAsText(f); e.target.value="";
});

/* ============================================================
   縮放
============================================================ */
let scale=1;
const scaler=document.getElementById("scaler");
function applyScale(){
  scaler.style.transform=`scale(${scale})`;
  scaler.style.width=(1120*scale)+"px";
  scaler.style.height=(1560*scale)+"px";
}
document.getElementById("zoomIn").addEventListener("click",()=>{scale=Math.min(2,scale+0.1);applyScale();});
document.getElementById("zoomOut").addEventListener("click",()=>{scale=Math.max(0.3,scale-0.1);applyScale();});
function fitWidth(){
  const vw=document.getElementById("viewport").clientWidth;
  scale=Math.min(1.6, Math.max(0.3,(vw-8)/1120));
  applyScale();
}
document.getElementById("zoomFit").addEventListener("click",fitWidth);
window.addEventListener("resize",()=>{ /* 保留使用者縮放，不自動改變 */ });
fitWidth();
</script>
</body>
</html>
